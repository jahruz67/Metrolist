name: Build APKs

on:
  workflow_dispatch:
  push:
    branches: ["**"]
    paths-ignore:
      - "README.md"
      - "fastlane/**"
      - "assets/**"
      - ".github/**/*.md"
      - ".github/FUNDING.yml"
      - ".github/ISSUE_TEMPLATE/**"

permissions:
  contents: write
  discussions: write

jobs:
  build_release:
    name: Build Release (${{ matrix.variant }})
    if: github.actor != 'dependabot[bot]' && github.actor != 'renovate[bot]'
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - variant: foss
            variantName: Foss
          - variant: gms
            variantName: Gms

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Set Up Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-cleanup: on-success

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Generate Dummy Debug Keystore
        run: |
          mkdir -p ~/.android
          keytool -genkey -v -keystore ~/.android/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "C=US, O=Android, CN=Android Debug"

      - name: Build Release APK and Run Lint
        run: ./gradlew --console=plain assemble${{ matrix.variantName }}Release :app:lint${{ matrix.variantName }}Release --warning-mode summary
        env:
          METROLIST_APPLICATION_ID: com.metrolist.music
          METROLIST_APP_NAME: Metrolist Nightly
          PULL_REQUEST: "false"
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          LASTFM_API_KEY: "dummy_key"
          LASTFM_SECRET: "dummy_secret"

      - name: Move Unsigned APK
        run: |
          OUTPUT_DIR="app/build/outputs/apk/${{ matrix.variant }}/release"
          mkdir -p "$OUTPUT_DIR/out"
          if [ "${{ matrix.variant }}" = "gms" ]; then
            TARGET_NAME="app-universal-with-Google-Cast-unsigned.apk"
          else
            TARGET_NAME="app-universal-release-unsigned.apk"
          fi
          # Find the unsigned APK and move it to the out folder
          find "$OUTPUT_DIR" -maxdepth 1 -name "*.apk" | xargs -I{} mv {} "$OUTPUT_DIR/out/$TARGET_NAME"

      - name: Upload Unsigned APK
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.variant == 'gms' && 'app-with-Google-Cast-unsigned' || 'app-release-unsigned' }}
          path: app/build/outputs/apk/${{ matrix.variant }}/release/out/*

  build_debug:
    name: Build Debug (${{ matrix.variant }})
    if: github.actor != 'dependabot[bot]' && github.actor != 'renovate[bot]'
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - variant: foss
            variantName: Foss
          - variant: gms
            variantName: Gms

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Set Up Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-cleanup: on-success

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Generate Dummy Debug Keystore
        run: |
          mkdir -p ~/.android
          keytool -genkey -v -keystore ~/.android/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "C=US, O=Android, CN=Android Debug"
          
          # Optional fallback: If your build.gradle also strictly looks for the old 'app/persistent-debug.keystore' 
          # uncomment the next line to copy it there too:
          # cp ~/.android/debug.keystore ./app/persistent-debug.keystore

      - name: Build Debug APK and Run Lint
        run: ./gradlew --console=plain assemble${{ matrix.variantName }}Debug :app:lint${{ matrix.variantName }}Debug --warning-mode summary
        env:
          METROLIST_APPLICATION_ID: com.metrolist.music
          METROLIST_APP_NAME: Metrolist Nightly
          PULL_REQUEST: "false"
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          LASTFM_API_KEY: "dummy_key"
          LASTFM_SECRET: "dummy_secret"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.variant == 'gms' && 'app-debug-gms' || 'app-debug' }}
          path: app/build/outputs/apk/${{ matrix.variant }}/debug/*.apk
